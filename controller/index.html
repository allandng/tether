<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tether</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #1c1c1e;
        flex: none;
      }
      #dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: none;
      }
      #dot.closed { background: #555; }
      #dot.connecting { background: #e6a700; }
      #dot.connected { background: #2ecc71; }
      #mode,
      #signal,
      #secret,
      #target,
      #host {
        background: #2a2a2d;
        border: 1px solid #3a3a3d;
        color: #eee;
        border-radius: 6px;
        padding: 6px 10px;
        width: 280px;
        font: inherit;
      }
      #connect {
        background: #3578f6;
        border: none;
        color: #fff;
        border-radius: 6px;
        padding: 6px 14px;
        font: inherit;
        cursor: pointer;
      }
      #clip {
        background: #2a2a2d;
        border: 1px solid #4a4a4e;
        border-radius: 6px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      #clip:hover {
        background: #3a3a3e;
      }
      #signal,
      #secret,
      #target {
        width: 150px;
      }
      #lan-fields,
      #rtc-fields {
        display: inline-flex;
        gap: 8px;
      }
      #lan-fields[hidden],
      #rtc-fields[hidden] {
        display: none;
      }
      #stats {
        margin-left: auto;
        font-variant-numeric: tabular-nums;
        color: #9a9aa0;
        font-size: 13px;
      }
      #stage {
        flex: 1;
        min-height: 0;
        display: flex;
      }
      #view {
        width: 100%;
        height: 100%;
        object-fit: contain;
        outline: none;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
