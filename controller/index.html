<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Tether</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        padding-top: max(8px, env(safe-area-inset-top));
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
        background: #1c1c1e;
        flex: none;
        flex-wrap: wrap;
      }
      #dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex: none;
      }
      #dot.closed { background: #555; }
      #dot.connecting { background: #e6a700; }
      #dot.connected { background: #2ecc71; }
      #mode,
      #display,
      #signal,
      #secret,
      #target,
      #host {
        background: #2a2a2d;
        border: 1px solid #3a3a3d;
        color: #eee;
        border-radius: 6px;
        padding: 6px 10px;
        width: 280px;
        font: inherit;
      }
      #connect {
        background: #3578f6;
        border: none;
        color: #fff;
        border-radius: 6px;
        padding: 6px 14px;
        font: inherit;
        cursor: pointer;
      }
      #clip,
      #kbd,
      #ptr,
      #full {
        background: #2a2a2d;
        border: 1px solid #4a4a4e;
        border-radius: 6px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      #clip:hover,
      #kbd:hover,
      #ptr:hover,
      #full:hover {
        background: #3a3a3e;
      }
      #kbd.on {
        background: #3578f6;
        border-color: #3578f6;
      }
      #signal,
      #secret,
      #target {
        width: 150px;
      }
      /* Phone layout: full-width inputs, the connect bar stacks. */
      @media (pointer: coarse) and (max-width: 600px) {
        #host,
        #signal,
        #secret,
        #target {
          width: 100%;
          padding: 10px;
        }
        #lan-fields,
        #rtc-fields {
          flex: 1 1 100%;
        }
        #connect,
        #clip,
        #kbd,
        #ptr,
        #full {
          padding: 10px 14px;
        }
      }
      #lan-fields,
      #rtc-fields {
        display: inline-flex;
        gap: 8px;
      }
      #lan-fields[hidden],
      #rtc-fields[hidden] {
        display: none;
      }
      #stats {
        margin-left: auto;
        font-variant-numeric: tabular-nums;
        color: #9a9aa0;
        font-size: 13px;
      }
      #stage {
        flex: 1;
        min-height: 0;
        display: flex;
      }
      #view {
        width: 100%;
        height: 100%;
        object-fit: contain;
        outline: none;
        /* swallow all native touch behaviors so gestures reach our handlers */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
